<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set Your Password - Cavendish University SMS</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <img src="{% static 'images/logo.png' %}" alt="Cavendish University">
      <h2>CAVENDISH UNIVERSITY</h2>
      <p>Set Your New Password</p>
    </div>
    <div class="login-divider"></div>
    <div class="alert alert-info">
      <i class="fas fa-info-circle"></i>
      This is your first login. Please set a new password to continue.
    </div>
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-danger">{{ message }}</div>
      {% endfor %}
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label"><i class="fas fa-lock"></i> New Password</label>
        <input type="password" name="new_password" class="form-control" placeholder="Enter new password (min 6 characters)" required>
      </div>
      <div class="form-group">
        <label class="form-label"><i class="fas fa-lock"></i> Confirm Password</label>
        <input type="password" name="confirm_password" class="form-control" placeholder="Confirm your new password" required>
      </div>
      <button type="submit" class="btn btn-navy" style="width:100%; justify-content:center; padding:12px; font-size:15px; margin-top:8px;">
        <i class="fas fa-save"></i> Set Password & Continue
      </button>
    </form>
  </div>
</div>
</body>
</html>
