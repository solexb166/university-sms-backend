{% extends 'base.html' %}
{% block title %}Edit User{% endblock %}
{% block content %}
<div class="page-header">
  <div><h1><i class="fas fa-user-edit"></i> Edit User</h1><p>Update details for @{{ edit_user.username }}</p></div>
  <a href="{% url 'users_list' %}" class="btn btn-gold"><i class="fas fa-arrow-left"></i> Back</a>
</div>
<div class="card" style="max-width:600px;">
  <div class="card-header"><h5><i class="fas fa-edit"></i> Edit User Details</h5></div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input type="text" name="first_name" class="form-control" value="{{ edit_user.first_name }}">
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input type="text" name="last_name" class="form-control" value="{{ edit_user.last_name }}">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" value="{{ edit_user.email }}">
      </div>
      <div class="form-group">
        <label class="form-label">Role</label>
        <select name="role" class="form-control">
          <option value="registry" {% if edit_user.role == 'registry' %}selected{% endif %}>Registry Staff</option>
          <option value="finance" {% if edit_user.role == 'finance' %}selected{% endif %}>Finance Staff</option>
          <option value="lecturer" {% if edit_user.role == 'lecturer' %}selected{% endif %}>Lecturer</option>
          <option value="exam_office" {% if edit_user.role == 'exam_office' %}selected{% endif %}>Exam Office</option>
          <option value="admin" {% if edit_user.role == 'admin' %}selected{% endif %}>Administrator</option>
          <option value="student" {% if edit_user.role == 'student' %}selected{% endif %}>Student</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">New Password <span style="color:#aaa; font-weight:400; font-size:12px;">(leave blank to keep current password)</span></label>
        <input type="password" name="new_password" class="form-control" placeholder="Leave blank to keep current password">
      </div>
      <button type="submit" class="btn btn-navy" style="width:100%; justify-content:center; padding:12px; font-size:15px;">
        <i class="fas fa-save"></i> Save Changes
      </button>
    </form>
  </div>
</div>
{% endblock %}
