{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Cavendish University Uganda SMS</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy: #0D1B5E;
  --navy-deep: #080F38;
  --navy-mid: #162272;
  --gold: #C9A84C;
  --gold-light: #E8C96A;
  --off-white: #F8F7F4;
}

/* ✅ FIXED */
html, body {
  min-height: 100%;
  overflow-x: hidden;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--navy-deep);
  display: flex;
  align-items: center;
  justify-content: center;
}

canvas#bg {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* ✅ FIXED */
.login-wrapper {
  position: relative;
  z-index: 10;
  display: flex;
  width: min(960px, 96vw);

  min-height: 580px;
  max-height: 90vh;

  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 40px 120px rgba(0,0,0,0.6);
}

/* LEFT */
.left-panel {
  flex: 1.1;
  min-height: 100%;
  background: linear-gradient(160deg, var(--navy-mid), var(--navy-deep));
  padding: 48px;
  color: white;
}

/* RIGHT */
.right-panel {
  flex: 1;
  background: var(--off-white);
  padding: 48px;

  display: flex;
  flex-direction: column;
  justify-content: center;

  /* ✅ KEY FIX */
  overflow-y: auto;
}

.form-header h2 {
  font-size: 32px;
  margin-bottom: 8px;
}

.form-header p {
  color: #888;
  margin-bottom: 20px;
}

.form-group {
  margin-bottom: 16px;
}

label {
  font-size: 12px;
  font-weight: 600;
}

.input-wrap {
  position: relative;
}

.input-wrap i {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: #aaa;
}

.input-wrap input {
  width: 100%;
  padding: 14px 14px 14px 40px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 14px;
}

.input-wrap input:focus {
  border-color: var(--gold);
  outline: none;
}

/* BUTTON */
.btn-login {
  margin-top: 10px;
  padding: 14px;
  border: none;
  background: var(--navy);
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

/* MOBILE FIX */
@media (max-width: 640px) {
  body {
    align-items: flex-start;
  }

  .login-wrapper {
    flex-direction: column;
    width: 100%;
    min-height: 100vh;
    max-height: none;
    border-radius: 0;
  }

  .right-panel {
    overflow: visible;
  }
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="login-wrapper">

  <!-- LEFT -->
  <div class="left-panel">
    <h2>Cavendish University Uganda</h2>
    <p>Student Records System</p>

    <h1 style="margin-top:40px;">Manage.<br>Track. <span style="color:gold;">Excel.</span></h1>
  </div>

  <!-- RIGHT -->
  <div class="right-panel">

    <div class="form-header">
      <h2>Welcome back</h2>
      <p>Sign in to your account</p>
    </div>

    <form method="post">
      {% csrf_token %}

      <div class="form-group">
        <label>Username</label>
        <div class="input-wrap">
          <i class="fas fa-user"></i>
          <input type="text" name="username" required>
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" name="password" required>
        </div>
      </div>

      <button class="btn-login">Sign In</button>
    </form>

  </div>

</div>

</body>
</html>
