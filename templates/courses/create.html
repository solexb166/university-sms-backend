{% extends 'base.html' %}
{% block title %}Add Course{% endblock %}
{% block content %}
<div class="page-header">
  <div><h1><i class="fas fa-plus"></i> Add New Course</h1><p>Create a new course for the module catalog</p></div>
  <a href="{% url 'courses_list' %}" class="btn btn-gold"><i class="fas fa-arrow-left"></i> Back</a>
</div>
<div class="card" style="max-width:700px;">
  <div class="card-header"><h5><i class="fas fa-book"></i> Course Details</h5></div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Course Code *</label>
          <input type="text" name="course_code" class="form-control" required placeholder="e.g. BIT212">
        </div>
        <div class="form-group">
          <label class="form-label">Course Name *</label>
          <input type="text" name="name" class="form-control" required placeholder="e.g. Systems Analysis and Design">
        </div>
        <div class="form-group">
          <label class="form-label">Department *</label>
          <select name="department" class="form-control" required>
            <option value="">Select Department</option>
            {% for dept in departments %}
            <option value="{{ dept.id }}">{{ dept.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Lecturer</label>
          <select name="lecturer" class="form-control">
            <option value="">Select Lecturer</option>
            {% for lec in lecturers %}
            <option value="{{ lec.id }}">{{ lec.full_name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Semester in Program *</label>
          <select name="semester_in_program" class="form-control" required>
            <option value="1">Semester 1 (Year 1 Sem 1)</option>
            <option value="2">Semester 2 (Year 1 Sem 2)</option>
            <option value="3">Semester 3 (Year 2 Sem 1)</option>
            <option value="4">Semester 4 (Year 2 Sem 2)</option>
            <option value="5">Semester 5 (Year 3 Sem 1)</option>
            <option value="6">Semester 6 (Year 3 Sem 2)</option>
            <option value="7">Semester 7 (Year 4 Sem 1)</option>
            <option value="8">Semester 8 (Year 4 Sem 2)</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Credits</label>
          <input type="number" name="credits" class="form-control" value="3" min="1" max="6">
        </div>
        <div class="form-group">
          <label class="form-label">Max Enrollment</label>
          <input type="number" name="max_enrollment" class="form-control" value="50">
        </div>
      </div>
      <button type="submit" class="btn btn-navy" style="width:100%; justify-content:center; padding:12px; font-size:15px; margin-top:8px;">
        <i class="fas fa-save"></i> Create Course
      </button>
    </form>
  </div>
</div>
{% endblock %}
